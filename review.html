<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Flag Review</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 24px; max-width: 1400px; margin: 0 auto; }
    h1 { color: #ffd700; margin-bottom: 4px; }
    .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    button { background: #222; color: #eee; border: 1px solid #444; padding: 7px 14px; cursor: pointer; font-family: monospace; font-size: 13px; border-radius: 4px; }
    button:hover { background: #333; }
    button.danger { border-color: #b00; color: #f88; }
    button.danger:hover { background: #2a0000; }
    .empty { color: #666; font-size: 15px; padding: 40px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
    th { text-align: left; padding: 8px 10px; background: #1a1a1a; color: #ffd700; border-bottom: 1px solid #333; white-space: nowrap; overflow: hidden; }
    th:nth-child(1)  { width: 35px; }
    th:nth-child(2)  { width: 50px; }
    th:nth-child(3)  { width: 95px; }
    /* th:nth-child(4) = Question: fills remaining space */
    th:nth-child(5)  { width: 155px; }
    th:nth-child(6)  { width: 65px; }
    th:nth-child(7)  { width: 80px; }
    th:nth-child(8)  { width: 75px; }
    th:nth-child(9)  { width: 155px; }
    th:nth-child(10) { width: 135px; }
    th:nth-child(11) { width: 145px; }
    td { padding: 10px 10px; border-bottom: 1px solid #222; vertical-align: top; overflow-wrap: break-word; word-break: break-word; }
    tr:hover td { background: #1a1a1a; }
    .q-id    { color: #888; }
    .q-shard { color: #94a3b8; font-size: 11px; white-space: nowrap; }
    .q-text  { color: #fff; }
    .q-ans   { color: #4ade80; }
    .q-diff  { white-space: nowrap; }
    .q-cat   { color: #a78bfa; white-space: nowrap; }
    .q-who   { color: #60a5fa; white-space: nowrap; }
    .q-time  { color: #888; white-space: nowrap; font-size: 11px; }
    .q-note  { color: #fbbf24; font-style: italic; }
    .badge-easy   { color: #4ade80; }
    .badge-medium { color: #fbbf24; }
    .badge-hard   { color: #f87171; }
    .actions td { padding: 12px 10px; }
    .resolved { opacity: 0.35; }
    .tag-resolved { color: #888; font-size: 11px; }
    #json-out { display: none; background: #1a1a1a; border: 1px solid #333; padding: 16px; font-size: 12px; overflow-x: auto; white-space: pre; margin-top: 16px; color: #ccc; border-radius: 4px; }
  </style>
</head>
<body>
<h1>🚩 Flag Review</h1>
<p class="meta">Flagged questions submitted by players. Reads from Firestore — works from any device.</p>

<div class="controls">
  <button onclick="loadFlags()">↻ Refresh</button>
  <button onclick="exportJSON()">⬇ Export JSON</button>
  <button onclick="clearResolved()">✓ Remove Resolved</button>
  <button class="danger" onclick="clearAll()">✕ Clear All Flags</button>
</div>

<div id="output"><p class="meta">Loading…</p></div>
<pre id="json-out"></pre>

<hr style="border:none;border-top:1px solid #333;margin:36px 0 24px;">
<h2 style="color:#ffd700;margin-bottom:4px;">👥 Users &amp; Score Reset</h2>
<p class="meta">Reset stats, points, streaks, and daily history for one or all players.</p>
<div class="controls">
  <button onclick="loadUsers()">↻ Refresh Users</button>
  <button class="danger" onclick="resetAllUsers()">⚠ Reset ALL Scores</button>
</div>
<div id="users-output"><p class="meta">Loading…</p></div>

<!-- Firebase compat SDK (same version as storage.js) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyC_keHyGc1Z46rzqB9wNKJ36wZgHscfGrQ",
  authDomain:        "disneytrivia-38ac6.firebaseapp.com",
  projectId:         "disneytrivia-38ac6",
  storageBucket:     "disneytrivia-38ac6.firebasestorage.app",
  messagingSenderId: "817552679289",
  appId:             "1:817552679289:web:1e82c3f0c72eeed2020fa8"
});
const db = firebase.firestore();

let cachedFlags = [];

// Exact question-id → shard filename map, built from the live manifest. Shard ID
// ranges aren't uniform (q-003 spans 501–799), so computing the shard from the id
// mislabels some questions — look it up instead.
let shardMap = null;

async function buildShardMap() {
  try {
    const manifest = await fetch('questions/manifest.json', { cache: 'no-cache' }).then(r => r.json());
    const entries = await Promise.all(manifest.shards.map(async s => {
      const qs = await fetch(s, { cache: 'no-cache' }).then(r => r.json());
      const file = s.split('/').pop();
      return qs.map(q => [q.id, file]);
    }));
    shardMap = new Map(entries.flat());
  } catch (e) {
    shardMap = null; // shard column shows '?' — flags still fully usable
  }
}

function shardFor(qid) {
  if (!shardMap) return '?';
  return shardMap.get(qid) || 'removed';
}

async function fetchFlags() {
  const snap = await db.collection('flags').get();
  return snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
  } catch { return iso || '—'; }
}

async function resolveFlag(docId) {
  await db.collection('flags').doc(docId).update({ _resolved: true });
  loadFlags();
}

async function unresolveFlag(docId) {
  await db.collection('flags').doc(docId).update({ _resolved: firebase.firestore.FieldValue.delete() });
  loadFlags();
}

async function deleteFlag(docId) {
  await db.collection('flags').doc(docId).delete();
  loadFlags();
}

async function clearResolved() {
  if (!confirm('Remove all resolved flags?')) return;
  const flags = await fetchFlags();
  const batch = db.batch();
  flags.filter(f => f._resolved).forEach(f => batch.delete(db.collection('flags').doc(f._docId)));
  await batch.commit();
  loadFlags();
}

async function clearAll() {
  if (!confirm('Delete ALL flags? This cannot be undone.')) return;
  const flags = await fetchFlags();
  const batch = db.batch();
  flags.forEach(f => batch.delete(db.collection('flags').doc(f._docId)));
  await batch.commit();
  loadFlags();
}

function exportJSON() {
  const el = document.getElementById('json-out');
  if (el.style.display === 'none' || el.style.display === '') {
    el.style.display = 'block';
    el.textContent = JSON.stringify(cachedFlags, null, 2);
  } else {
    el.style.display = 'none';
  }
}

async function loadFlags() {
  const out = document.getElementById('output');
  out.innerHTML = '<p class="meta">Loading…</p>';

  const flags = await fetchFlags();
  flags.sort((a, b) => new Date(b.timestamp || 0) - new Date(a.timestamp || 0)); // newest first
  cachedFlags = flags;

  if (flags.length === 0) {
    out.innerHTML = '<p class="empty">No flags yet — looks like the questions are all good! 🎉</p>';
    return;
  }

  const pending  = flags.filter(f => !f._resolved).length;
  const resolved = flags.length - pending;

  let html = `<p class="meta">${flags.length} total &nbsp;·&nbsp; ${pending} pending &nbsp;·&nbsp; ${resolved} resolved</p>`;
  html += '<table><thead><tr>';
  html += '<th>#</th><th>Q ID</th><th>Shard</th><th>Question</th><th>Correct Answer</th><th>Diff</th><th>Cat</th><th>By</th><th>Comment</th><th>Date</th><th>Action</th>';
  html += '</tr></thead><tbody>';

  flags.forEach((f, i) => {
    const rowClass = f._resolved ? ' class="resolved"' : '';
    const diffClass = `badge-${f.difficulty || 'easy'}`;
    const docId = f._docId;
    html += `<tr${rowClass}>`;
    html += `<td class="q-id">${i + 1}</td>`;
    html += `<td class="q-id">${f.questionId}</td>`;
    html += `<td class="q-shard">${shardFor(f.questionId)}</td>`;
    html += `<td class="q-text">${esc(f.questionText)}</td>`;
    html += `<td class="q-ans">${esc(f.correctAnswer)}</td>`;
    html += `<td class="${diffClass}">${f.difficulty || '—'}</td>`;
    html += `<td class="q-cat">${f.category || '—'}</td>`;
    html += `<td class="q-who">${esc(f.reportedBy || '—')}</td>`;
    html += `<td class="q-note">${f.comment ? esc(f.comment) : '<span style="color:#444">—</span>'}</td>`;
    html += `<td class="q-time">${formatDate(f.timestamp)}</td>`;
    html += `<td style="white-space:nowrap">`;
    if (f._resolved) {
      html += `<span class="tag-resolved">✓ resolved</span> `;
      html += `<button onclick="unresolveFlag('${docId}')">Undo</button> `;
    } else {
      html += `<button onclick="resolveFlag('${docId}')">✓ Resolve</button> `;
    }
    html += `<button class="danger" onclick="deleteFlag('${docId}')">Delete</button>`;
    html += `</td></tr>`;
  });

  html += '</tbody></table>';
  out.innerHTML = html;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =============================================================================
// Users & Score Reset
// =============================================================================
const SCORE_ZERO = {
  totalAnswered: 0, totalCorrect: 0, gamesPlayed: 0, totalPoints: 0,
  dailyStreak: 0, lastDailyDate: null, lastDailyScore: null, lastDailyPoints: 0,
  lastDailyAnswers: null, categoryStats: {},
  prevDailyDate: null, prevDailyScore: null, prevDailyPoints: null, prevDailyAnswers: null
};

let cachedUsers = [];

async function fetchUsers() {
  const snap = await db.collection('users').get();
  return snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
}

// Takes an index into cachedUsers rather than inline string args — names with
// quotes/apostrophes would break an inline onclick handler.
async function resetUser(idx) {
  const u = cachedUsers[idx];
  if (!u) return;
  if (!confirm(`Reset ALL scores for ${u.name}?\n\nThis clears: points, games, correct %, streak, daily history.\n\nThis cannot be undone.`)) return;
  await db.collection('users').doc(u._docId).update(SCORE_ZERO);
  loadUsers();
}

async function resetAllUsers() {
  if (!confirm('Reset scores for EVERY player?\n\nThis clears ALL points, games, streaks, and daily history for everyone.\n\nThis cannot be undone.')) return;
  if (!confirm('Are you absolutely sure? This affects all players permanently.')) return;
  const users = await fetchUsers();
  const batch = db.batch();
  users.forEach(u => batch.update(db.collection('users').doc(u._docId), SCORE_ZERO));
  await batch.commit();
  loadUsers();
}

async function loadUsers() {
  const out = document.getElementById('users-output');
  out.innerHTML = '<p class="meta">Loading…</p>';
  const users = await fetchUsers();
  cachedUsers = users;
  if (!users.length) {
    out.innerHTML = '<p class="empty">No users found.</p>';
    return;
  }
  let html = '<table><thead><tr>';
  html += '<th>Name</th><th>Games</th><th>Questions</th><th>Correct %</th><th>Points</th><th>Streak</th><th>Last Daily</th><th>Action</th>';
  html += '</tr></thead><tbody>';
  users.forEach((u, i) => {
    const pct = u.totalAnswered ? Math.round(u.totalCorrect / u.totalAnswered * 100) + '%' : '—';
    const pts = (u.totalPoints || 0).toLocaleString();
    html += `<tr>
      <td style="color:#fff;font-weight:bold">${esc(u.name)}</td>
      <td>${u.gamesPlayed || 0}</td>
      <td>${u.totalAnswered || 0}</td>
      <td>${pct}</td>
      <td style="color:#ffd700">${pts}</td>
      <td>${u.dailyStreak ? '🔥 ' + u.dailyStreak : '—'}</td>
      <td style="color:#888;font-size:11px">${u.lastDailyDate || '—'}</td>
      <td><button class="danger" onclick="resetUser(${i})">Reset</button></td>
    </tr>`;
  });
  html += '</tbody></table>';
  out.innerHTML = html;
}

buildShardMap().then(loadFlags);
loadUsers();
</script>
</body>
</html>
