<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Question Flag Review</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 24px; max-width: 900px; margin: 0 auto; }
    h1 { color: #ffd700; margin-bottom: 4px; }
    .meta { color: #888; font-size: 13px; margin-bottom: 24px; }
    .controls { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    button { background: #222; color: #eee; border: 1px solid #444; padding: 7px 14px; cursor: pointer; font-family: monospace; font-size: 13px; border-radius: 4px; }
    button:hover { background: #333; }
    button.danger { border-color: #b00; color: #f88; }
    button.danger:hover { background: #2a0000; }
    .empty { color: #666; font-size: 15px; padding: 40px 0; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 10px; background: #1a1a1a; color: #ffd700; border-bottom: 1px solid #333; white-space: nowrap; }
    td { padding: 10px 10px; border-bottom: 1px solid #222; vertical-align: top; }
    tr:hover td { background: #1a1a1a; }
    .q-id    { color: #888; width: 40px; }
    .q-text  { color: #fff; max-width: 280px; }
    .q-ans   { color: #4ade80; }
    .q-diff  { }
    .q-cat   { color: #a78bfa; }
    .q-who   { color: #60a5fa; white-space: nowrap; }
    .q-time  { color: #888; white-space: nowrap; font-size: 11px; }
    .q-note  { color: #fbbf24; font-style: italic; }
    .badge-easy   { color: #4ade80; }
    .badge-medium { color: #fbbf24; }
    .badge-hard   { color: #f87171; }
    .actions td { padding: 12px 10px; }
    .resolved { opacity: 0.35; }
    .tag-resolved { color: #888; font-size: 11px; }
    #json-out { display: none; background: #1a1a1a; border: 1px solid #333; padding: 16px; font-size: 12px; overflow-x: auto; white-space: pre; margin-top: 16px; color: #ccc; border-radius: 4px; }
  </style>
</head>
<body>
<h1>🚩 Flag Review</h1>
<p class="meta">Flagged questions submitted by players. Reads from Firestore — works from any device.</p>

<div class="controls">
  <button onclick="loadFlags()">↻ Refresh</button>
  <button onclick="exportJSON()">⬇ Export JSON</button>
  <button onclick="clearResolved()">✓ Remove Resolved</button>
  <button class="danger" onclick="clearAll()">✕ Clear All Flags</button>
</div>

<div id="output"><p class="meta">Loading…</p></div>
<pre id="json-out"></pre>

<!-- Firebase compat SDK (same version as storage.js) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyC_keHyGc1Z46rzqB9wNKJ36wZgHscfGrQ",
  authDomain:        "disneytrivia-38ac6.firebaseapp.com",
  projectId:         "disneytrivia-38ac6",
  storageBucket:     "disneytrivia-38ac6.firebasestorage.app",
  messagingSenderId: "817552679289",
  appId:             "1:817552679289:web:1e82c3f0c72eeed2020fa8"
});
const db = firebase.firestore();

let cachedFlags = [];

async function fetchFlags() {
  const snap = await db.collection('flags').get();
  return snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
}

function formatDate(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}) + ' ' +
           d.toLocaleTimeString('en-US', {hour:'numeric',minute:'2-digit'});
  } catch { return iso || '—'; }
}

async function resolveFlag(docId) {
  await db.collection('flags').doc(docId).update({ _resolved: true });
  loadFlags();
}

async function unresolveFlag(docId) {
  await db.collection('flags').doc(docId).update({ _resolved: firebase.firestore.FieldValue.delete() });
  loadFlags();
}

async function deleteFlag(docId) {
  await db.collection('flags').doc(docId).delete();
  loadFlags();
}

async function clearResolved() {
  if (!confirm('Remove all resolved flags?')) return;
  const flags = await fetchFlags();
  const batch = db.batch();
  flags.filter(f => f._resolved).forEach(f => batch.delete(db.collection('flags').doc(f._docId)));
  await batch.commit();
  loadFlags();
}

async function clearAll() {
  if (!confirm('Delete ALL flags? This cannot be undone.')) return;
  const flags = await fetchFlags();
  const batch = db.batch();
  flags.forEach(f => batch.delete(db.collection('flags').doc(f._docId)));
  await batch.commit();
  loadFlags();
}

function exportJSON() {
  const el = document.getElementById('json-out');
  if (el.style.display === 'none' || el.style.display === '') {
    el.style.display = 'block';
    el.textContent = JSON.stringify(cachedFlags, null, 2);
  } else {
    el.style.display = 'none';
  }
}

async function loadFlags() {
  const out = document.getElementById('output');
  out.innerHTML = '<p class="meta">Loading…</p>';

  const flags = await fetchFlags();
  cachedFlags = flags;

  if (flags.length === 0) {
    out.innerHTML = '<p class="empty">No flags yet — looks like the questions are all good! 🎉</p>';
    return;
  }

  const pending  = flags.filter(f => !f._resolved).length;
  const resolved = flags.length - pending;

  let html = `<p class="meta">${flags.length} total &nbsp;·&nbsp; ${pending} pending &nbsp;·&nbsp; ${resolved} resolved</p>`;
  html += '<table><thead><tr>';
  html += '<th>#</th><th>Q ID</th><th>Question</th><th>Correct Answer</th><th>Diff</th><th>Cat</th><th>By</th><th>Comment</th><th>Date</th><th>Action</th>';
  html += '</tr></thead><tbody>';

  flags.forEach((f, i) => {
    const rowClass = f._resolved ? ' class="resolved"' : '';
    const diffClass = `badge-${f.difficulty || 'easy'}`;
    const docId = f._docId;
    html += `<tr${rowClass}>`;
    html += `<td class="q-id">${i + 1}</td>`;
    html += `<td class="q-id">${f.questionId}</td>`;
    html += `<td class="q-text">${esc(f.questionText)}</td>`;
    html += `<td class="q-ans">${esc(f.correctAnswer)}</td>`;
    html += `<td class="${diffClass}">${f.difficulty || '—'}</td>`;
    html += `<td class="q-cat">${f.category || '—'}</td>`;
    html += `<td class="q-who">${esc(f.reportedBy || '—')}</td>`;
    html += `<td class="q-note">${f.comment ? esc(f.comment) : '<span style="color:#444">—</span>'}</td>`;
    html += `<td class="q-time">${formatDate(f.timestamp)}</td>`;
    html += `<td style="white-space:nowrap">`;
    if (f._resolved) {
      html += `<span class="tag-resolved">✓ resolved</span> `;
      html += `<button onclick="unresolveFlag('${docId}')">Undo</button> `;
    } else {
      html += `<button onclick="resolveFlag('${docId}')">✓ Resolve</button> `;
    }
    html += `<button class="danger" onclick="deleteFlag('${docId}')">Delete</button>`;
    html += `</td></tr>`;
  });

  html += '</tbody></table>';
  out.innerHTML = html;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadFlags();
</script>
</body>
</html>
